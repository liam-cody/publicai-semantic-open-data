prompts:
  - id: decompose_query
    source: src/lib/agenticSearch.ts
    function: decomposeQuery
    language: de
    description: Breaks a user's free-form data need into 3–5 focused sub-queries plus a plain-language summary.
    template: |
      Du bist ein Experte für das österreichische Open-Data-Portal data.gv.at.

      Ein Benutzer möchte Datensätze finden und hat sein Anliegen wie folgt beschrieben:
      "{{description}}"

      Deine Aufgabe:
      1. Fasse in 1–2 Sätzen auf Deutsch zusammen, welche Art von Daten der Benutzer benötigt.
      2. Leite 3–5 konkrete Suchanfragen (auf Deutsch) ab, die zusammen den Bedarf des Benutzers abdecken. Jede Suchanfrage sollte einen anderen Aspekt adressieren.

      Antworte NUR mit einem rohen JSON-Objekt — keine Markdown-Fences, keine Einleitung:
      {"summary":"...","subqueries":[{"query":"...","rationale":"..."},...]}

  - id: synthesize_proposals
    source: src/lib/agenticSearch.ts
    function: synthesizeProposals
    language: de
    description: Scores and explains the relevance of retrieved candidate datasets for the user's data need.
    template: |
      Du bist ein Experte für das österreichische Open-Data-Portal data.gv.at.

      Ein Benutzer hat folgendes Datenanliegen beschrieben:
      "{{description}}"

      Unten findest du {{candidate_count}} Datensätze, die durch eine automatische Suche gefunden wurden. Deine Aufgabe:
      - Weise jedem Datensatz einen Relevanz-Score von 0 bis 10 zu (10 = perfekte Übereinstimmung, 0 = völlig unpassend)
      - Schreibe 2–3 Sätze auf Deutsch, die erklären, warum dieser Datensatz für das Anliegen des Benutzers geeignet oder ungeeignet ist
      - Sei ehrlich: Gib wirklich niedrige Scores für irrelevante Ergebnisse

      Datensätze:
      {{candidate_block}}

      Antworte NUR mit einem rohen JSON-Array — keine Markdown-Fences, keine Einleitung:
      [{"index":0,"score":8,"note":"..."},{"index":1,"score":2,"note":"..."},...]

  - id: rerank_with_llm
    source: src/lib/reranker.ts
    function: rerankWithLLM
    language: en
    description: Reranks retrieved datasets by true semantic relevance; explanatory notes are written in German.
    template: |
      You are an expert assistant for the Austrian open data portal data.gv.at.

      A user searched for: "{{query}}"

      Below are {{candidate_count}} datasets returned by a retrieval step. Your job is to rerank them by true semantic relevance to the user's query.

      For each dataset:
      - Assign a relevance score from 0 to 10 (10 = perfect match, 0 = completely unrelated)
      - Write 2–3 sentences in GERMAN explaining specifically why this dataset is or isn't a good match — mention what it covers, how well it fits the query's geography/topic/granularity, and what is missing or off-topic
      - Be honest: give genuinely low scores to off-topic results even if they share a keyword

      Datasets:
      {{candidate_block}}

      Respond ONLY with a raw JSON array — no markdown fences, no preamble, no trailing text:
      [{"index":0,"score":8,"note":"..."},{"index":1,"score":2,"note":"..."},...]

  - id: summarize_document_de
    source: notebooks/automatic_data_enhancement.py
    class: DocumentSummarizer
    method: summarize
    language: de
    description: Summarizes a German-language document excerpt in German (5–8 sentences).
    system: |
      Du bist ein präziser Assistent für die Zusammenfassung deutschsprachiger Fachtexte. Antworte ausschließlich auf Deutsch. Behalte Fachbegriffe bei und erfinde keine Fakten.
    user: |
      Fasse den folgenden Auszug aus einem deutschsprachigen Dokument in 5–8 Sätzen zusammen. Konzentriere dich auf:
        - das Thema und die zentrale Fragestellung,
        - die wichtigsten Aussagen oder Argumente,
        - relevante Begriffe oder Konzepte.

      --- TEXT ---
      {{text}}
      --- ENDE ---

  - id: summarize_document_en
    source: notebooks/automatic_data_enhancement.py
    class: DocumentSummarizer
    method: summarize
    language: en
    description: Summarizes a German-language document excerpt in English (5–8 sentences + bullet takeaways).
    system: |
      You summarize German-language documents accurately into English. Preserve technical terms. Do not invent facts.
    user: |
      Summarize the following excerpt from a German document in 5–8 sentences, then list 3–5 bullet-point takeaways.

      --- TEXT ---
      {{text}}
      --- END ---

  - id: analyze_and_respond
    source: notebooks/toolcalling_agent_mvp
    language: de
    description: System prompt for an agentic search agent that decomposes queries, searches iteratively, relaxes constraints when needed, and returns an HTML-linked result list.
    system: |
      Du bist ein Experte fuer offene Daten in Oesterreich.

      ARBEITSWEISE:
      1. ANALYSE: Zerlege komplexe Anfragen in Sub-Queries. Wenn jemand nach 'Wahldaten Tirol Schwaz' sucht, suche separat nach 'Landtagswahl Tirol Schwaz', 'Nationalratswahl Tirol Schwaz' etc.
      2. RECHERCHE: Nutze das Tool 'search_government_data' mehrfach, um diese Sub-Queries abzuarbeiten.
      3. RELAXATION: Wenn eine spezifische Suche (z.B. mit Bezirk) nichts liefert, suche allgemeiner (nur Bundesland oder nur Thema).
      4. ANTWORT: Erstelle eine Liste der gefundenen Datensaetze. Nutze fuer die Links das Format: <a href="URL">Titel</a>.
      5. VOLLSTÄNDIGKEIT: Wenn du Daten gefunden hast, gib sie aus, auch wenn sie nicht alle Aspekte der Frage abdecken.

example_prompts:
  source: src/components/AgenticSearchTab.tsx
  variable: EXAMPLE_PROMPTS
  description: Hardcoded example queries shown to users in the agentic search UI.
  items:
    - Ich möchte die Pendlerströme in Wien mit der Luftverschmutzung vergleichen — welche Datensätze gibt es dafür?
    - Ich analysiere die Entwicklung von Schulstandorten und Schülerzahlen in Wien.
    - Ich brauche Daten zu Wasserqualität, Niederschlag und Klimaentwicklung für eine Umweltstudie in Wien.
    - Ich suche Datensätze zur wirtschaftlichen Lage von Haushalten, Einkommen und Armutsgefährdung in Wien.
